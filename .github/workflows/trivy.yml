name: Container Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  scan:
    name: Scan Container Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend image
        run: |
          docker build -t dndudchl/lms-backend:local ./backend-flask

      - name: Build frontend image
        run: |
          docker build -t dndudchl/lms-frontend:local ./frontend-react

      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'dndudchl/lms-backend:local'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        
        if: always()
        with:
          image-ref: 'dndudchl/lms-frontend:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
